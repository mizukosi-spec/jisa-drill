<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時差計算ドリル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #185FA5;
    --blue-dk: #0C447C;
    --green-bg:#EAF3DE;
    --green-tx:#3B6D11;
    --green-bd:#639922;
    --red-bg:  #FCEBEB;
    --red-tx:  #A32D2D;
    --red-bd:  #E24B4A;
    --gray-bg: #F4F4F2;
    --gray-bd: #DDDDD8;
    --text:    #1a1a1a;
    --text-sub:#666;
    --radius:  12px;
    --radius-sm:8px;
  }

  html, body {
    min-height: 100%;
    background: #F0F2F5;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 48px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-sub);
  }

  /* レベルタブ */
  .level-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tab-btn {
    flex: 1;
    min-width: 56px;
    padding: 10px 4px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-bd);
    background: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-sub);
    transition: all 0.15s;
    line-height: 1.3;
    text-align: center;
  }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }

  /* プログレス */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--gray-bd);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 13px;
    color: var(--text-sub);
    min-width: 44px;
    text-align: right;
    font-weight: 500;
  }

  /* 問題カード */
  .question-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .q-meta {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 14px;
    color: var(--text);
  }
  .hint-box {
    font-size: 13px;
    color: #555;
    background: #FFF8E8;
    border-left: 3px solid #F0B429;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 8px 12px;
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* 入力エリア */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-row input {
    flex: 1;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-bd);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    background: #fff;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
  }
  .input-row input:focus {
    outline: none;
    border-color: var(--blue);
  }
  .input-row input.ok  { border-color: var(--green-bd); background: var(--green-bg); }
  .input-row input.ng  { border-color: var(--red-bd);   background: var(--red-bg); }
  .input-row input:disabled { opacity: 1; }

  .ans-btn {
    padding: 12px 18px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .ans-btn:active { background: var(--blue-dk); }

  /* フィードバック */
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.7;
    display: none;
  }
  .feedback.correct { background: var(--green-bg); color: var(--green-tx); border: 1px solid var(--green-bd); }
  .feedback.wrong   { background: var(--red-bg);   color: var(--red-tx);   border: 1px solid var(--red-bd); }
  .feedback.show    { display: block; }

  /* 次へボタン */
  .next-btn {
    display: none;
    margin-top: 12px;
    width: 100%;
    padding: 13px;
    border: 1.5px solid var(--gray-bd);
    border-radius: var(--radius-sm);
    background: var(--gray-bg);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text);
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .next-btn.show { display: block; }
  .next-btn:active { opacity: 0.7; }

  /* 結果カード */
  .result-card {
    display: none;
    background: #fff;
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .result-card.show { display: block; }
  .result-title { font-size: 14px; color: var(--text-sub); margin-bottom: 6px; }
  .result-score {
    font-size: 52px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 4px;
    line-height: 1.1;
  }
  .result-msg {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.8;
    white-space: pre-line;
    margin-bottom: 24px;
  }
  .stars { font-size: 28px; margin-bottom: 12px; letter-spacing: 4px; }
  .retry-btn {
    width: 100%;
    padding: 14px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .retry-btn:active { background: var(--blue-dk); }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>🌍 時差計算ドリル</h1>
    <p>15度 ＝ 1時間の時差だよ！レベルをえらんでスタート！</p>
  </div>

  <div class="level-tabs" id="levelTabs"></div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 10</div>
  </div>

  <div id="questionArea"></div>

  <div class="result-card" id="resultCard">
    <div class="result-title">結果はっぴょう！</div>
    <div class="result-score" id="resultScore"></div>
    <div class="stars" id="resultStars"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="retry-btn" onclick="retryLevel()">もう一度ちょうせん！</button>
  </div>
</div>

<script>
const EAST = [
  {city:'ロンドン',     country:'イギリス',         lon:0,   ew:'東経', lonAbs:0},
  {city:'ローマ',       country:'イタリア',          lon:15,  ew:'東経', lonAbs:15},
  {city:'カイロ',       country:'エジプト',          lon:30,  ew:'東経', lonAbs:30},
  {city:'リヤド',       country:'サウジアラビア',    lon:45,  ew:'東経', lonAbs:45},
  {city:'カラチ',       country:'パキスタン',        lon:60,  ew:'東経', lonAbs:60},
  {city:'デリー',       country:'インド',            lon:75,  ew:'東経', lonAbs:75},
  {city:'ダッカ',       country:'バングラデシュ',    lon:90,  ew:'東経', lonAbs:90},
  {city:'バンコク',     country:'タイ',              lon:105, ew:'東経', lonAbs:105},
  {city:'北京',         country:'中国',              lon:120, ew:'東経', lonAbs:120},
  {city:'大阪',         country:'日本',              lon:135, ew:'東経', lonAbs:135},
  {city:'シドニー',     country:'オーストラリア',    lon:150, ew:'東経', lonAbs:150}
];
const WEST = [
  {city:'ニューヨーク', country:'アメリカ', lon:-75,  ew:'西経', lonAbs:75},
  {city:'シカゴ',       country:'アメリカ', lon:-90,  ew:'西経', lonAbs:90},
  {city:'デンバー',     country:'アメリカ', lon:-105, ew:'西経', lonAbs:105},
  {city:'ロサンゼルス', country:'アメリカ', lon:-120, ew:'西経', lonAbs:120}
];

function label(c){ return c.country+'の'+c.city; }
function lonLabel(c){ return c.ew+c.lonAbs+'度'; }
function pickFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pickTwo(arr){
  let a=pickFrom(arr),b;
  do{ b=pickFrom(arr); }while(b.city===a.city);
  return [a,b];
}
function pickSameEW(){
  return Math.random()<0.5 ? pickTwo(EAST) : pickTwo(WEST);
}
function timeStr(baseH,baseM,diffH){
  const total=baseH*60+baseM+diffH*60;
  let norm=((total%1440)+1440)%1440;
  const hh=Math.floor(norm/60);
  const mm=norm%60;
  let day='';
  if(total<0) day='（前の日の）';
  else if(total>=1440) day='（次の日の）';
  return day+hh+'時'+(mm===0?'ちょうど':mm+'分');
}

function makeL1(){
  const [a,b]=pickSameEW();
  const diff=Math.abs(a.lon-b.lon);
  const big=a.lonAbs>b.lonAbs?a:b, sml=a.lonAbs>b.lonAbs?b:a;
  return {
    q:label(a)+'（'+lonLabel(a)+'）と'+label(b)+'（'+lonLabel(b)+'）の経度の差は何度ですか？',
    type:'number', ans:diff,
    hint:'大きい方の経度から小さい方の経度をひこう',
    explain:big.lonAbs+'度 － '+sml.lonAbs+'度 ＝ '+diff+'度 だね！'
  };
}
function makeL2(){
  const [a,b]=pickSameEW();
  const diff=Math.abs(a.lon-b.lon)/15;
  return {
    q:label(a)+'（'+lonLabel(a)+'）と'+label(b)+'（'+lonLabel(b)+'）の時差は何時間ですか？',
    type:'number', ans:diff,
    hint:'時差（時間）＝ 経度の差 ÷ 15',
    explain:'経度の差 '+Math.abs(a.lon-b.lon)+'度 ÷ 15 ＝ '+diff+'時間 だね！'
  };
}
function makeL3(){
  const a=pickFrom(EAST), b=pickFrom(WEST);
  const totalDeg=a.lonAbs+b.lonAbs, diff=totalDeg/15;
  return {
    q:label(a)+'（'+lonLabel(a)+'）と'+label(b)+'（'+lonLabel(b)+'）の時差は何時間ですか？',
    type:'number', ans:diff,
    hint:'東経と西経をまたぐときは、東経の度数と西経の度数をたして ÷ 15',
    explain:'東経'+a.lonAbs+'度 ＋ 西経'+b.lonAbs+'度 ＝ '+totalDeg+'度 ÷ 15 ＝ '+diff+'時間 だね！'
  };
}
function makeL4(){
  const [a,b]=pickSameEW();
  const diffH=(b.lon-a.lon)/15;
  const baseH=6+Math.floor(Math.random()*13);
  const baseM=[0,30][Math.floor(Math.random()*2)];
  const ans=timeStr(baseH,baseM,diffH);
  const absD=Math.abs(diffH);
  const dir=diffH>=0?label(b)+'の方が'+absD+'時間進んでいる':label(b)+'の方が'+absD+'時間おくれている';
  const op=diffH>=0?'たす':'ひく';
  return {
    q:label(a)+'が'+baseH+'時'+(baseM===0?'ちょうど':baseM+'分')+'のとき、'+label(b)+'は何時ですか？',
    type:'text', ans,
    hint:dir+'よ',
    explain:lonLabel(a)+'と'+lonLabel(b)+'の時差は'+absD+'時間。'+baseH+'時'+(baseM===0?'':baseM+'分')+'に'+absD+'時間を'+op+'と '+ans+' だね！'
  };
}
function makeL5(){
  const flip=Math.random()<0.5;
  const a=flip?pickFrom(EAST):pickFrom(WEST);
  const b=flip?pickFrom(WEST):pickFrom(EAST);
  const diffH=(b.lon-a.lon)/15;
  const baseH=6+Math.floor(Math.random()*13);
  const baseM=[0,30][Math.floor(Math.random()*2)];
  const ans=timeStr(baseH,baseM,diffH);
  const absD=Math.abs(diffH);
  const eCity=flip?a:b, wCity=flip?b:a;
  const totalDeg=eCity.lonAbs+wCity.lonAbs;
  const op=diffH>=0?'たす':'ひく';
  return {
    q:label(a)+'が'+baseH+'時'+(baseM===0?'ちょうど':baseM+'分')+'のとき、'+label(b)+'は何時ですか？',
    type:'text', ans,
    hint:'東経と西経をまたぐよ。経度の差は'+eCity.lonAbs+'＋'+wCity.lonAbs+'＝'+totalDeg+'度 → '+absD+'時間の時差',
    explain:'東経'+eCity.lonAbs+'度 ＋ 西経'+wCity.lonAbs+'度 ＝ '+totalDeg+'度 ÷ 15 ＝ '+absD+'時間の時差。'+baseH+'時'+(baseM===0?'':baseM+'分')+'に'+absD+'時間を'+op+'と '+ans+' だね！'
  };
}

const MAKERS=[makeL1,makeL2,makeL3,makeL4,makeL5];
const LEVEL_NAMES=['レベル1','レベル2','レベル3','レベル4','レベル5'];
const LEVEL_DESC=[
  '経度の差を求めよう\n（東経どうし or 西経どうし）',
  '時差を求めよう\n（東経どうし or 西経どうし）',
  '時差を求めよう\n（東経・西経またぐ）',
  '時こくを求めよう\n（東経どうし or 西経どうし）',
  '時こくを求めよう\n（東経・西経またぐ）'
];

let currentLevel=0,questions=[],qi=0,score=0,answered=false;

function generateQuestions(level){
  const qs=[];
  for(let i=0;i<10;i++) qs.push(MAKERS[level]());
  return qs;
}

function renderTabs(){
  const tabs=document.getElementById('levelTabs');
  tabs.innerHTML='';
  for(let i=0;i<5;i++){
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===currentLevel?' active':'');
    btn.innerHTML=LEVEL_NAMES[i];
    btn.onclick=(function(lv){ return function(){ selectLevel(lv); }; })(i);
    tabs.appendChild(btn);
  }
}

function selectLevel(level){
  currentLevel=level;
  questions=generateQuestions(level);
  qi=0;score=0;answered=false;
  renderTabs();
  document.getElementById('resultCard').classList.remove('show');
  renderQuestion();
  updateProgress();
}

function updateProgress(){
  document.getElementById('progressFill').style.width=(qi/10*100)+'%';
  document.getElementById('progressLabel').textContent=qi+' / 10';
}

function renderQuestion(){
  if(qi>=10){ showResult(); return; }
  const q=questions[qi];
  answered=false;
  let ph = q.type==='number' ? '数字を入力' : '例：14時30分';
  let inputType = q.type==='number' ? 'number' : 'text';
  let html='<div class="question-card">';
  html+='<div class="q-meta">'+LEVEL_DESC[currentLevel].replace('\n',' ｜ ')+' &nbsp;｜&nbsp; 問題 '+(qi+1)+' / 10</div>';
  html+='<div class="q-text">'+q.q+'</div>';
  html+='<div class="hint-box">💡 ヒント：'+q.hint+'</div>';
  html+='<div class="input-row"><input type="'+inputType+'" id="ansInput" placeholder="'+ph+'" inputmode="'+(q.type==='number'?'numeric':'text')+'" /><button class="ans-btn" onclick="answerFree()">答える</button></div>';
  html+='<div class="feedback" id="feedback"></div>';
  html+='<button class="next-btn" id="nextBtn" onclick="nextQuestion()">'+(qi<9?'次の問題 →':'結果を見る →')+'</button>';
  html+='</div>';
  document.getElementById('questionArea').innerHTML=html;
  const inp=document.getElementById('ansInput');
  if(inp) inp.addEventListener('keydown',function(e){ if(e.key==='Enter') answerFree(); });
}

function showFeedback(correct,q){
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(correct?'correct':'wrong');
  fb.innerHTML=(correct?'⭕ 正解！ ':'❌ 不正解。正しい答えは「'+q.ans+'」だよ。 ')+q.explain;
  document.getElementById('nextBtn').className='next-btn show';
  if(correct) score++;
  answered=true;
}

function normalizeTime(s){
  return s.replace(/\s/g,'').replace(/（.*?）/g,'').replace(/ちょうど/g,'0分').replace(/時(\d)分/,'時0$1分');
}

function answerFree(){
  if(answered) return;
  const q=questions[qi];
  const input=document.getElementById('ansInput');
  const val=input.value.trim();
  let correct=false;
  if(q.type==='number'){
    correct=parseFloat(val)===q.ans;
  } else {
    correct=normalizeTime(val)===normalizeTime(q.ans)||val===String(q.ans);
  }
  input.disabled=true;
  input.className=correct?'ok':'ng';
  showFeedback(correct,q);
}

function nextQuestion(){
  qi++;
  updateProgress();
  renderQuestion();
}

function showResult(){
  document.getElementById('questionArea').innerHTML='';
  const rc=document.getElementById('resultCard');
  rc.classList.add('show');
  document.getElementById('resultScore').textContent=score+' / 10';
  let stars='', msg='';
  if(score===10){ stars='⭐⭐⭐'; msg='かんぺき！すばらしいね！\n次のレベルにもちょうせんしてみよう！'; }
  else if(score>=8){ stars='⭐⭐'; msg='よくできました！\nあと少しでかんぺき！'; }
  else if(score>=6){ stars='⭐'; msg='なかなかいいね！\nもう一度やってみよう！'; }
  else { stars=''; msg='もう少し練習してみよう！\nヒントをよく読んでね。'; }
  document.getElementById('resultStars').textContent=stars;
  document.getElementById('resultMsg').textContent=msg;
}

function retryLevel(){ selectLevel(currentLevel); }

selectLevel(0);
</script>
</body>
</html>
